version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: landscape_minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped

# Notes:
# - To start MinIO for local development: `docker compose up -d`

